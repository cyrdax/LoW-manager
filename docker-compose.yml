services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eve_fleet_dashboard
      POSTGRES_USER: eve_app
      POSTGRES_PASSWORD: eve_app_dev
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eve_app -d eve_fleet_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
